---
name: build-binaries

on:
  workflow_dispatch:
    inputs:
      build_set:
        description: Which refs to build?
        type: choice
        required: true
        default: current
        options:
          - current
          - trio
      ref:
        description: Git ref to build when build_set=current (tag/branch/SHA). Leave empty to use the selected ref.
        type: string
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.ref }} ${{ matrix.goos }}/${{ matrix.arch_suffix }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ref: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.build_set == 'trio' && '["v1.9.5","v1.18.2","v1.22.2"]' || format('["{0}"]', (github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '' && github.event.inputs.ref || github.ref_name))) }}
        arch:
          - amd64
          - arm64
          - armv7
        include:
          - arch: amd64
            goos: linux
            goarch: amd64
            goarm: ""
            arch_suffix: amd64
          - arch: arm64
            goos: linux
            goarch: arm64
            goarm: ""
            arch_suffix: arm64
          - arch: armv7
            goos: linux
            goarch: arm
            goarm: "7"
            arch_suffix: armv7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOFLAGS: "-mod=vendor"
          GOARM: ${{ matrix.goarm }}
        run: |
          make "bin/skopeo.${{ matrix.goos }}.${{ matrix.goarch }}" DISABLE_CGO=1

      - name: Collect binary
        run: |
          mkdir -p dist
          cp "bin/skopeo.${{ matrix.goos }}.${{ matrix.goarch }}" "dist/skopeo-${{ matrix.ref }}-${{ matrix.goos }}-${{ matrix.arch_suffix }}"
          chmod +x "dist/skopeo-${{ matrix.ref }}-${{ matrix.goos }}-${{ matrix.arch_suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skopeo-${{ matrix.ref }}-${{ matrix.goos }}-${{ matrix.arch_suffix }}
          path: dist/skopeo-${{ matrix.ref }}-${{ matrix.goos }}-${{ matrix.arch_suffix }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/skopeo-*
